<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VNGX Academy – Workshop</title>

  <link rel="stylesheet" href="/academy/assets/css/academy.css">
</head>

<body>

<div class="grid-bg"></div>
<div class="ambient"></div>

<script>
if(localStorage.getItem('academyAccess') !== 'true'){
  window.location.href='academy-login.html';
}
</script>

<div class="container">

  <section class="hero">

    <h1>Workshop Titel</h1>

    <p>
      Beschreibung des Workshops,
      Inhalte und Ziele.
    </p>

    <div class="hero-buttons">

      <a href="academy.html" class="btn">
        ← Zurück zur Übersicht
      </a>

    </div>

  </section>

  <!-- VIDEO -->

  <section class="section">

    <div class="video-wrapper">

      <iframe
        src="https://www.youtube.com/embed/VIDEO_ID"
        allowfullscreen>
      </iframe>

    </div>

  </section>

  <!-- CONTENT -->

  <section class="grid-2">

    <div class="card">

      <h3>📝 Mitschrift</h3>

      <p>
        Hier kommt eure Mitschrift,
        Zusammenfassung oder Analyse hinein.
      </p>

    </div>

    <div class="card downloads">

      <h3>📎 Materialien</h3>

      <a href="#">
        Workshop PDF
      </a>

      <a href="#">
        Zusatzmaterial
      </a>

      <a href="#">
        Szenario Dateien
      </a>

    </div>

  </section>

  <!-- GALLERY -->

  <section class="section">

    <div class="card">

      <h3>🖼 Szenarien & Bilder</h3>

      <div class="gallery">

        <img src="/academy/assets/images/example1.jpg">
        <img src="/academy/assets/images/example2.jpg">
        <img src="/academy/assets/images/example3.jpg">
        <img src="/academy/assets/images/example4.jpg">

      </div>

    </div>

  </section>

  <!-- COMPLETE -->

  <button class="complete-btn" onclick="completeWorkshop()">
    Workshop abgeschlossen
  </button>

</div>

<script>
function completeWorkshop(){

  localStorage.setItem(
    window.location.pathname,
    'done'
  );

  alert('Workshop gespeichert');
}
</script>

</body>
</html>
