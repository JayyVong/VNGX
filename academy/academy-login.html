<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNGX Academy Login</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    :root{
      --panel:rgba(18,22,35,.92);
      --line:rgba(255,255,255,.08);
      --text:#ffffff;
      --muted:#b9c1cf;
      --blue:#7fe9ff;
      --pink:#ff78da;
      --shadow:0 20px 50px rgba(0,0,0,.28);
      --radius:26px;
      --max:1280px;
    }
    body {
      margin: 0;
      background: #0b0f18;
      color: white;
      font-family: Inter, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: var(--panel);
      padding: 40px;
      border-radius: var(--radius);
      width: 350px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
      color: var(--blue);
    }

    p {
      color: var(--muted);
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-bottom: 20px;
      background: #1f1f2b;
      color: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg,var(--blue),var(--pink));
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #6847ff;
    }
  </style>
</head>
<body>

</html>
