<!DOCTYPE html>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VNGX Academy Login</title>
<head>
  <link rel="stylesheet" href="/academy/assets/css/academy.css">
</head>
 
<body>

<div class="login-box">
  <h1>VNGX Academy</h1>
  <p>Zugang zu allen Workshops & Lerninhalten</p>

  <input type="password" id="password" placeholder="Passwort eingeben">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const pass = document.getElementById('password').value;

  if(pass === 'vngxacademy2026') {
    localStorage.setItem('academyAccess', 'true');
    window.location.href = '/academy/academy.html';
  } else {
    alert('Falsches Passwort');
  }
}
</script>

</body>
</html>
