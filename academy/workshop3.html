<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VNGX Academy – Workshop</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --panel:rgba(18,22,35,.92);
  --line:rgba(255,255,255,.08);
  --text:#ffffff;
  --muted:#b9c1cf;
  --blue:#7fe9ff;
  --pink:#ff78da;
  --shadow:0 20px 50px rgba(0,0,0,.28);
  --radius:26px;
  --max:1280px;
}

body{
  font-family:Arial,sans-serif;
  color:var(--text);

  background:
    radial-gradient(circle at top left, rgba(127,233,255,.12), transparent 22%),
    radial-gradient(circle at top right, rgba(255,120,218,.10), transparent 24%),
    linear-gradient(180deg,#04050a 0%, #080b13 55%, #05060a 100%);

  min-height:100vh;
  overflow-x:hidden;
}

.grid-bg{
  position:fixed;
  inset:0;
  z-index:-2;
  pointer-events:none;
  opacity:.04;

  background-image:
    linear-gradient(rgba(255,255,255,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.12) 1px, transparent 1px);

  background-size:48px 48px;
}

.ambient{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;

  background:
    radial-gradient(circle at 18% 14%, rgba(127,233,255,.10), transparent 24%),
    radial-gradient(circle at 84% 11%, rgba(255,120,218,.10), transparent 22%),
    radial-gradient(circle at 58% 74%, rgba(151,129,255,.08), transparent 30%);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px 80px;
}

.hero{
  text-align:center;
  padding:70px 20px 50px;
}

.hero h1{
  font-size:58px;
  margin-bottom:20px;

  background:linear-gradient(90deg,var(--blue),var(--pink));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  max-width:760px;
  margin:auto;
  color:var(--muted);
  font-size:18px;
  line-height:1.8;
}

.hero-buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:35px;
  flex-wrap:wrap;
}

.btn{
  display:inline-block;
  padding:16px 26px;

  border-radius:18px;

  text-decoration:none;
  color:white;
  font-weight:700;

  background:
    linear-gradient(
      135deg,
      rgba(127,233,255,.16),
      rgba(255,120,218,.16)
    );

  border:1px solid var(--line);

  backdrop-filter:blur(12px);

  box-shadow:var(--shadow);

  transition:.25s;
}

.btn:hover{
  transform:translateY(-3px);
}

.section{
  margin-top:30px;
}

.video-wrapper{
  overflow:hidden;

  border-radius:var(--radius);

  border:1px solid var(--line);

  box-shadow:var(--shadow);
}

iframe{
  width:100%;
  height:700px;
  border:none;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:30px;
}

.card{
  background:var(--panel);

  border:1px solid var(--line);

  border-radius:var(--radius);

  padding:30px;

  box-shadow:var(--shadow);

  backdrop-filter:blur(12px);
}

.card h3{
  margin-bottom:18px;
  color:var(--blue);
  font-size:26px;
}

.card p{
  color:var(--muted);
  line-height:1.8;
}

.downloads a{
  display:block;

  margin-bottom:14px;

  padding:15px;

  border-radius:16px;

  background:rgba(255,255,255,.04);

  transition:.2s;
}

.downloads a:hover{
  transform:translateY(-2px);
  border:1px solid rgba(127,233,255,.3);
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
}

.gallery img{
  width:100%;
  border-radius:22px;
  border:1px solid var(--line);
}

.complete-btn{
  width:100%;

  margin-top:30px;

  padding:18px;

  border:none;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      rgba(127,233,255,.16),
      rgba(255,120,218,.16)
    );

  border:1px solid var(--line);

  color:white;

  font-size:18px;
  font-weight:700;

  cursor:pointer;

  box-shadow:var(--shadow);

  transition:.25s;
}

.complete-btn:hover{
  transform:translateY(-3px);
}

@media(max-width:900px){

.grid-2{
  grid-template-columns:1fr;
}

iframe{
  height:400px;
}

.hero h1{
  font-size:42px;
}

.hero p{
  font-size:16px;
}

}

</style>
</head>

<body>

<div class="grid-bg"></div>
<div class="ambient"></div>

<script>
if(localStorage.getItem('academyAccess') !== 'true'){
  window.location.href='academy-login.html';
}
</script>

<div class="container">

<section class="hero">

<h1>Workshop Titel</h1>

<p>
Beschreibung des Workshops,
Inhalte und Ziele.
</p>

<div class="hero-buttons">

<a href="academy.html" class="btn">
← Zurück zur Übersicht
</a>

</div>

</section>

<!-- VIDEO -->

<section class="section">

<div class="video-wrapper">

<iframe
src="https://www.youtube.com/embed/VIDEO_ID"
allowfullscreen>
</iframe>

</div>

</section>

<!-- CONTENT -->

<section class="grid-2">

<div class="card">

<h3>📝 Mitschrift</h3>

<p>
Hier kommt eure Mitschrift,
Zusammenfassung oder Analyse hinein.
</p>

</div>

<div class="card downloads">

<h3>📎 Materialien</h3>

<a href="#">
Workshop PDF
</a>

<a href="#">
Zusatzmaterial
</a>

<a href="#">
Szenario Dateien
</a>

</div>

</section>

<!-- GALLERY -->

<section class="section">

<div class="card">

<h3>🖼 Szenarien & Bilder</h3>

<div class="gallery">

<img src="/academy/assets/images/example1.jpg">
<img src="/academy/assets/images/example2.jpg">
<img src="/academy/assets/images/example3.jpg">
<img src="/academy/assets/images/example4.jpg">

</div>

</div>

</section>

<!-- COMPLETE -->

<button class="complete-btn" onclick="completeWorkshop()">
Workshop abgeschlossen
</button>

</div>

<script>

function completeWorkshop(){

localStorage.setItem(
window.location.pathname,
'done'
);

alert('Workshop gespeichert');

}

</script>

</body>
</html>
