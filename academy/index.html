<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>VNGX Academy</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#07090f;
      color:white;
      font-family:Arial,sans-serif;
      overflow:hidden;
    }

    .box{
      text-align:center;
      padding:40px;
      border-radius:24px;
      background:rgba(18,22,35,.92);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

    h1{
      font-size:58px;
      margin-bottom:14px;
      color:#7fe9ff;
    }

    p{
      color:#b9c1cf;
      font-size:18px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>COMING SOON</h1>
    <p>Die VNGX Academy befindet sich aktuell im Aufbau.</p>
  </div>
</body>
</html>
